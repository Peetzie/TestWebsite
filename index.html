<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Data Lab | Terminal</title>
  <!-- Modular CSS references -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/terminal.css">
  <link rel="stylesheet" href="css/circle-icons.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/journey.css">
</head>
<body>
  <div id="background-canvas">
    <div class="circle-container">
      <img src="assets/icons/pytorch.png" alt="PyTorch">
      <img src="assets/icons/pandas.png" alt="Pandas">
      <img src="assets/icons/alteryx.png" alt="Alteryx">
      <img src="assets/icons/databricks.png" alt="Databricks">
      <img src="assets/icons/python.png" alt="Python">
      <img src="assets/icons/Azure DevOps.png" alt="Azure DevOps">
      <img src="assets/icons/docker.png" alt="Docker">
    </div>
  </div>

  <div class="window">
    <div class="title-bar">
      <span class="dot red" id="close-btn"></span>
      <span class="dot yellow" id="minimize-btn"></span>
      <span class="dot green" id="maximize-btn"></span>
      <span class="app-title">🧪 Data Terminal</span>
    </div>
    <div class="terminal" id="terminal">
      <div class="line">$ <span id="user-input"></span><span class="cursor">▮</span></div>
    </div>
    <input type="text" id="hidden-input" autofocus />
  </div>

<div id="journey-window" class="browser-window" style="display: none;">
  <div class="window-header">
    <div class="controls">
      <span class="circle red" id="close-btn-journey"></span>
    </div>
    <span class="title">Career Journey</span>
  </div>
  <div class="window-content">
    <svg class="timeline" viewBox="0 0 600 120">
      <path id="journey-path" d="M20 60 Q150 20 300 60 Q450 100 580 60"
            stroke="#00ff99" fill="none" stroke-width="2"/>
    </svg>
    <div class="labels">
      <span class="label" style="left: 20px;">📍 PwC - Mar 2021</span>
      <span class="label" style="left: 300px;">🧠 ML Model - Sep 2022</span>
      <span class="label" style="left: 580px;">🚀 Open Source - Jan 2024</span>
    </div>
  </div>
</div>



  <!-- Floating reopen icon -->
  <div id="reopen-icon" title="Open Terminal">💻</div>
  <!-- Modular JS entry point -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
